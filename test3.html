<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: black;
        }
        .container {
            text-align: center;
            max-width: 900px;
            padding: 20px;
            background-color: #333333;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .album-art {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .audio-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            background-color: #4ade80;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .back-btn {
            background-color: red;
            margin-top: 20px;
        }
        .back-btn:hover {
            background-color: #e65c00;
        }
        .time-display {
            margin: 10px 0;
            font-size: 14px;
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="container">
       
        
        <!-- Image will be loaded here -->
        <img src="" alt="Album Art" class="album-art" id="albumArt">
        
        <!-- Audio player controls -->
        <div class="audio-controls">
            <button id="rewindBtn"><i class="fa-solid fa-backward"></i> 10s</button>
            <button id="playPauseBtn"><i class="fa-solid fa-play"></i> Play</button>
            <button id="skipBtn"><i class="fa-solid fa-forward"></i> 10s</button>
        </div>
        
        <div class="time-display">
            <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
        </div>
        
        <!-- Audio element (hidden) -->
        <audio id="audioPlayer"></audio>
        
        <!-- Back button -->
        <button class="back-btn" onclick="window.location.href='index.html'">Back to Selection</button>
    </div>

    <script>
        // Get elements
        const audioPlayer = document.getElementById('audioPlayer');
        const albumArt = document.getElementById('albumArt');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const skipBtn = document.getElementById('skipBtn');
        const currentTimeDisplay = document.getElementById('currentTime');
        const durationDisplay = document.getElementById('duration');
        
        // Load the selected content from localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const selectedImage = localStorage.getItem('selectedImage');
            const selectedAudio = localStorage.getItem('selectedAudio');
            
            if (selectedImage && selectedAudio) {
                albumArt.src = selectedImage;
                audioPlayer.src = selectedAudio;
                
                // When metadata is loaded, update duration
                audioPlayer.addEventListener('loadedmetadata', () => {
                    durationDisplay.textContent = formatTime(audioPlayer.duration);
                });
            } else {
                alert('No content selected!');
                window.location.href = 'index.html';
            }
        });
        
        // Play/Pause functionality
        playPauseBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseBtn.textContent = '⏸ Pause';
            } else {
                audioPlayer.pause();
                playPauseBtn.textContent = '▶ Play';
            }
        });
        
        // Rewind 10 seconds
        rewindBtn.addEventListener('click', () => {
            audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 10);
        });
        
        // Skip 10 seconds
        skipBtn.addEventListener('click', () => {
            audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 10);
        });
        
        // Update time display
        audioPlayer.addEventListener('timeupdate', () => {
            currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
        });
        
        // Format time (seconds to MM:SS)
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    </script>
</body>
</html>
