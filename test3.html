<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Now Playing</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(to bottom, #222, #000);
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .player-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
      }

      .album-art {
        width: 320px;
        height: 320px;
        border-radius: 20px;
        object-fit: cover;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
      }

      .song-title {
        font-size: 22px;
        font-weight: bold;
        margin-top: 20px;
      }

      .song-artist {
        color: #aaa;
        margin-top: 5px;
      }

      .progress-container {
        width: 60%;
        margin-top: 20px;
      }

      .progress {
        width: 100%;
        height: 5px;
      }

      .time {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #aaa;
      }

      .controls {
        margin-top: 25px;
        display: flex;
        align-items: center;
        gap: 25px;
      }

      .controls i {
        cursor: pointer;
      }

      .play-btn {
        background: white;
        color: black;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }

      .add-btn {
        margin-top: 15px;
        background: #4ade80;
        border: none;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
      }

      .top-bar {
        position: absolute;
        top: 20px;
        left: 20px;
      }

      .back-btn {
        background: #4ade80;
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #4ade80;
        color: black;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: bold;
        opacity: 0;
        transition:
          opacity 0.3s ease,
          bottom 0.3s ease;
        z-index: 9999;
      }

      .toast.show {
        opacity: 1;
        bottom: 40px;
      }
      @media (max-width: 768px) {
        .album-art {
          width: 280px;
          height: 280px;
        }
        .progress-container {
          width: 90%;
        }
      }
    </style>
  </head>

  <body>
    <div class="top-bar">
      <button class="back-btn" onclick="window.location = 'home.html'">
        <i class="fa fa-arrow-left"></i>
      </button>
    </div>

    <div class="player-container">
      <img id="albumArt" class="album-art" />

      <div id="songTitle" class="song-title"></div>
      <div id="songArtist" class="song-artist"></div>

      <div class="progress-container">
        <input type="range" id="progress" class="progress" value="0" />
        <div class="time">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>

      <div class="controls">
        <i class="fa-solid fa-shuffle" id="shuffleBtn"></i>
        <i class="fa-solid fa-backward-step" id="prevBtn"></i>
        <div class="play-btn" id="playPauseBtn">
          <i class="fa-solid fa-play"></i>
        </div>
        <i class="fa-solid fa-forward-step" id="nextBtn"></i>
        <i class="fa-solid fa-repeat" id="repeatBtn"></i>
      </div>

      <button class="add-btn" id="addToLibrary">+ Add to Library</button>
      <div id="toast" class="toast">Added to Library</div>
    </div>

    <audio id="audio"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyBEkbpXaQGAGEdnbdOkfseKkw0DnXBFyWc",
        authDomain: "sonadev-35c29.firebaseapp.com",
        projectId: "sonadev-35c29",
        storageBucket: "sonadev-35c29.appspot.com",
        messagingSenderId: "896577604099",
        appId: "1:896577604099:web:09179fc434949e8edddc36",
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      const audio = document.getElementById("audio");
      const albumArt = document.getElementById("albumArt");
      const titleEl = document.getElementById("songTitle");
      const artistEl = document.getElementById("songArtist");
      const playPauseBtn = document.getElementById("playPauseBtn");
      const progress = document.getElementById("progress");
      const currentTimeEl = document.getElementById("currentTime");
      const durationEl = document.getElementById("duration");

      let queue = JSON.parse(localStorage.getItem("trackQueue")) || [];
      let currentIndex = 0;
      let isShuffle = false;
      let isRepeat = false;

      window.addEventListener("DOMContentLoaded", async () => {
        const savedTrack = JSON.parse(localStorage.getItem("selectedTrack"));

        if (!savedTrack) {
          window.location = "home.html";
          return;
        }

        const response = await fetch(
          "https://striveschool-api.herokuapp.com/api/deezer/search?q=" +
            savedTrack.artist,
        );

        const data = await response.json();

        queue = data.data.slice(0, 10).map((track) => ({
          image: track.album.cover_big,
          audio: track.preview,
          title: track.title,
          artist: track.artist.name,
        }));

        currentIndex = queue.findIndex((t) => t.audio === savedTrack.audio);

        if (currentIndex === -1) currentIndex = 0;

        loadTrack(currentIndex);
      });

      function loadTrack(index) {
        const track = queue[index];
        if (!track) return;

        albumArt.src = track.image;
        audio.src = track.audio;
        titleEl.textContent = track.title;
        artistEl.textContent = track.artist;

        localStorage.setItem("selectedTrack", JSON.stringify(track));
      }

      playPauseBtn.onclick = () => {
        if (audio.paused) {
          audio.play();
          playPauseBtn.innerHTML = '<i class="fa fa-pause"></i>';
        } else {
          audio.pause();
          playPauseBtn.innerHTML = '<i class="fa fa-play"></i>';
        }
      };

      document.getElementById("nextBtn").onclick = () => {
        if (isShuffle) {
          currentIndex = Math.floor(Math.random() * queue.length);
        } else {
          currentIndex++;
          if (currentIndex >= queue.length) {
            if (isRepeat) {
              currentIndex = 0;
            } else {
              return;
            }
          }
        }
        loadTrack(currentIndex);
        audio.play();
      };

      document.getElementById("prevBtn").onclick = () => {
        currentIndex--;
        if (currentIndex < 0) currentIndex = 0;
        loadTrack(currentIndex);
        audio.play();
      };

      audio.addEventListener("ended", () => {
        if (isRepeat) {
          audio.play();
        } else {
          document.getElementById("nextBtn").click();
        }
      });

      document.getElementById("shuffleBtn").onclick = () => {
        isShuffle = !isShuffle;
        alert("Shuffle " + (isShuffle ? "On" : "Off"));
      };

      document.getElementById("repeatBtn").onclick = () => {
        isRepeat = !isRepeat;
        alert("Repeat " + (isRepeat ? "On" : "Off"));
      };

      audio.addEventListener("timeupdate", () => {
        progress.value = (audio.currentTime / audio.duration) * 100;
        currentTimeEl.textContent = formatTime(audio.currentTime);
      });

      audio.addEventListener("loadedmetadata", () => {
        durationEl.textContent = formatTime(audio.duration);
      });

      progress.oninput = () => {
        audio.currentTime = (progress.value / 100) * audio.duration;
      };

      function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ":" + (s < 10 ? "0" : "") + s;
      }
      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      document.getElementById("addToLibrary").onclick = async () => {
        const user = auth.currentUser;
        if (!user) {
          showToast("Login required");
          return;
        }

        const currentTrack = queue[currentIndex];

        if (!currentTrack) {
          showToast("No track loaded");
          return;
        }

        await db
          .collection("users")
          .doc(user.uid)
          .collection("playlist")
          .add({
            trackName: currentTrack.title || "Unknown",
            artist: currentTrack.artist || "Unknown",
            cover: currentTrack.image || "",
            preview: currentTrack.audio || "",
            savedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });

        showToast("Added to Library");
      };
    </script>
  </body>
</html>
