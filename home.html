<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sonadev-home</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #000;
        color: white;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        background: #111;
        flex-wrap: wrap;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        cursor: pointer;
      }

      .logo img {
        height: 35px;
      }

      .home-btn {
        background: #4ade80;
        border: none;
        padding: 6px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }

      .search-container {
        display: flex;
        gap: 8px;
      }

      .search-container input {
        padding: 8px;
        border: none;
        border-radius: 5px;
      }

      .search-container button {
        background: #4ade80;
        border: none;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 5px;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .library-btn {
        background: #4ade80;
        border: none;
        padding: 6px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }

      #logout-button {
        background: red;
        border: none;
        padding: 8px 12px;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }

      .hero {
        display: flex;
      }

      .hero-left {
        flex: 3;
        padding: 20px;
      }

      .hero-right {
        flex: 1;
        background: #111;
        padding: 20px;
      }

      .section-title {
        color: #4ade80;
        margin-top: 30px;
      }

      .grid-row {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
        margin-top: 15px;
      }

      .music-card {
        background: #1c1a1a;
        padding: 10px;
        border-radius: 10px;
        transition: 0.3s;
        position: relative;
        cursor: pointer;
      }

      .music-card:hover {
        transform: translateY(-5px);
      }

      .music-card img {
        width: 100%;
        border-radius: 8px;
      }

      .music-card p {
        color: #4ade80;
        margin-top: 8px;
        font-size: 13px;
      }

      .save-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        background: #4ade80;
        border: none;
        padding: 4px 6px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 12px;
      }

      .spinner {
        display: none;
        text-align: center;
        margin: 30px 0;
      }

      .spinner div {
        width: 50px;
        height: 50px;
        border: 5px solid #4ade80;
        border-top: 5px solid transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #4ade80;
        color: black;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: bold;
        opacity: 0;
        transition:
          opacity 0.3s ease,
          bottom 0.3s ease;
        z-index: 9999;
      }

      .toast.show {
        opacity: 1;
        bottom: 40px;
      }

      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          align-items: stretch;
          gap: 10px;
        }

        .nav-left {
          justify-content: space-between;
        }

        .search-container {
          width: 100%;
        }

        .search-container input {
          flex: 1;
        }

        .hero {
          flex-direction: column;
        }

        .hero-right {
          margin-top: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div id="toast" class="toast">Added to Library</div>

    <nav class="navbar">
      <div class="nav-left">
        <div class="logo" onclick="goHome()">
          <img src="./download__9_-removebg-preview.png" />
        </div>

        <button class="home-btn" onclick="goHome()">
          <i class="fa-solid fa-house"></i>
        </button>
      </div>

      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search music..." />
        <button id="searchBtn"><i class="fa fa-search"></i></button>
      </div>

      <div class="nav-right">
        <button class="library-btn" onclick="scrollToLibrary()">Library</button>
        <button id="logout-button">Logout</button>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-left" id="mainContent"></div>
      <div class="hero-right" id="librarySection">
        <h3 style="color: #4ade80">Your Library</h3>
      </div>
    </section>

    <div class="spinner" id="spinner">
      <div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyBEkbpXaQGAGEdnbdOkfseKkw0DnXBFyWc",
        authDomain: "sonadev-35c29.firebaseapp.com",
        projectId: "sonadev-35c29",
        storageBucket: "sonadev-35c29.appspot.com",
        messagingSenderId: "896577604099",
        appId: "1:896577604099:web:09179fc434949e8edddc36",
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();
      const API = "https://striveschool-api.herokuapp.com/api/deezer/";

      const spinner = document.getElementById("spinner");

      function showSpinner() {
        spinner.style.display = "block";
      }
      function hideSpinner() {
        spinner.style.display = "none";
      }

      auth.onAuthStateChanged((user) => {
        if (!user) {
          window.location.replace("index.html");
          return;
        }
        loadHome();
        loadPlaylist();
      });

      document.getElementById("logout-button").onclick = () => {
        auth.signOut().then(() => window.location.replace("index.html"));
      };

      function goHome() {
        loadHome();
      }

      function scrollToLibrary() {
        document
          .getElementById("librarySection")
          .scrollIntoView({ behavior: "smooth" });
      }

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      async function loadHome() {
        showSpinner();
        const artists = ["wizkid", "davido", "asake", "burna boy", "rema"];
        const container = document.getElementById("mainContent");
        container.innerHTML = "";
        let songs = [];
        for (let a of artists) {
          const r = await fetch(API + "search?q=" + a);
          const d = await r.json();
          songs.push(...d.data.slice(0, 5));
        }
        renderSection("Popular Afrobeat", songs, container);
        hideSpinner();
      }

      document.getElementById("searchBtn").onclick = searchMusic;
      document
        .getElementById("searchInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") searchMusic();
        });

      async function searchMusic() {
        const q = document.getElementById("searchInput").value.trim();
        if (!q) return;
        showSpinner();
        const r = await fetch(API + "search?q=" + q);
        const d = await r.json();
        const container = document.getElementById("mainContent");
        container.innerHTML = "";
        renderSection("Search Results", d.data.slice(0, 15), container);
        hideSpinner();
      }

      function renderSection(title, items, container) {
        const h = document.createElement("h2");
        h.className = "section-title";
        h.textContent = title;
        container.appendChild(h);

        const grid = document.createElement("div");
        grid.className = "grid-row";

        items.forEach((item) => {
          const card = document.createElement("div");
          card.className = "music-card";
          card.innerHTML = `
      <button class="save-btn">+</button>
      <img src="${item.album.cover_medium}">
      <p>${item.title}<br>${item.artist.name}</p>
    `;
          card.querySelector(".save-btn").onclick = (e) => {
            e.stopPropagation();
            saveToPlaylist(item);
          };
          card.onclick = () =>
            loadContent(
              item.album.cover_big,
              item.preview,
              item.title,
              item.artist.name,
            );
          grid.appendChild(card);
        });

        container.appendChild(grid);
      }

      async function saveToPlaylist(track) {
        const user = auth.currentUser;
        await db
          .collection("users")
          .doc(user.uid)
          .collection("playlist")
          .doc(track.id.toString())
          .set({
            trackName: track.title,
            artist: track.artist.name,
            cover: track.album.cover_big,
            preview: track.preview,
            savedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });

        showToast("Added to Library");
        loadPlaylist();
      }

      async function loadPlaylist() {
        const user = auth.currentUser;
        const snap = await db
          .collection("users")
          .doc(user.uid)
          .collection("playlist")
          .orderBy("savedAt", "desc")
          .get();

        const lib = document.getElementById("librarySection");
        lib.innerHTML = "<h3 style='color:#4ade80;'>Your Library</h3>";

        const grid = document.createElement("div");
        grid.className = "grid-row";

        snap.forEach((doc) => {
          const d = doc.data();
          const card = document.createElement("div");
          card.className = "music-card";
          card.innerHTML = `
      <button class="save-btn">X</button>
      <img src="${d.cover}">
      <p>${d.trackName}<br>${d.artist}</p>
    `;
          card.onclick = () => loadContent(d.cover, d.preview);
          card.querySelector(".save-btn").onclick = (e) => {
            e.stopPropagation();
            doc.ref.delete();
            loadPlaylist();
          };
          grid.appendChild(card);
        });

        lib.appendChild(grid);
      }

      function loadContent(img, audio, title, artist) {
        const currentTrack = {
          image: img,
          audio: audio,
          title: title,
          artist: artist,
        };

        localStorage.setItem("selectedTrack", JSON.stringify(currentTrack));

        localStorage.setItem("trackQueue", JSON.stringify([currentTrack]));

        window.location = "test3.html";
      }
    </script>
  </body>
</html>
